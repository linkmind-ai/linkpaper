name: linkpaper

services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      DATABASE_URL: "postgresql://${POSTGRES_USER:-linkpaper}:${POSTGRES_PASSWORD:-linkpaper-password}@postgres:5432/${POSTGRES_DB:-linkpaper}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-linkpaper-password}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-linkpaper}"
      POSTGRES_USER: "${POSTGRES_USER:-linkpaper}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-linkpaper-password}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linkpaper} -d ${POSTGRES_DB:-linkpaper}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
